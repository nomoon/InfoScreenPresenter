name: Publish release
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    permissions:
      artifact-metadata: write
      contents: write
    runs-on: windows-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Publish app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
